<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ThinkFlow</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/leader-line-new@1.1.9/leader-line.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { margin:0; background:#f1f5f9; overflow:hidden; touch-action:none; }

.header {
    display:flex; justify-content:space-between;
    padding:12px 16px; background:white;
    border-bottom:1px solid #ddd;
    font-weight:bold;
}

.canvas {
    width:100%; height:70vh;
    position:relative;
    background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
    background-size: 20px 20px;
    transform-origin:0 0;
}

.node {
    position:absolute;
    padding:12px;
    border-radius:12px;
    min-width:100px;
    background:white;
    touch-action:none;
}

.node-box { border:2px solid; }
.node-text { font-size:22px; font-weight:bold; background:transparent; }

.resizer {
    width:14px;height:14px;
    position:absolute;
    right:0;bottom:0;
    background:#6366f1;
}

/* UI拡大 */
.ui-scale {
    transform:scale(1.5);
    transform-origin:top left;
}

/* テロップ */
.splash {
    position:fixed;
    inset:0;
    background:#000;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:28px;
    z-index:9999;
    animation:fadeOut 2.5s forwards;
}

@keyframes fadeOut {
    0% { opacity:1; }
    80% { opacity:1; }
    100% { opacity:0; visibility:hidden; }
}
</style>
</head>

<body>

<!-- テロップ -->
<div class="splash">
    <div style="color:#8b5cf6;">ThinkFlow</div>
    <div style="font-size:14px;margin-top:10px;">藤井工藝</div>
</div>

<div class="header">
    <div style="color:#8b5cf6;">ThinkFlow</div>
    <div>藤井工藝</div>
</div>

<div class="p-2 space-y-2 bg-white ui-scale">

<div class="flex gap-2 flex-wrap">
<button onclick="undo()">戻る</button>
<button onclick="exportPDF()">PDF</button>
<button onclick="downloadData()">保存</button>
<button onclick="importData()">読込</button>
<button onclick="clearAll()">全消去</button>
</div>

<select id="mode">
<option value="box">枠あり</option>
<option value="text">枠なし</option>
</select>

<select id="category"></select>

<div class="flex gap-2">
<input id="newCat" placeholder="カテゴリ">
<input type="color" id="catColor">
<button onclick="addCategory()">追加</button>
</div>

<textarea id="input" placeholder="入力"></textarea>
<button onclick="createNode()">追加</button>

</div>

<div id="canvas" class="canvas"></div>

<script>
// ===== データ =====
let categories = JSON.parse(localStorage.getItem("cats")) || {
    "資産・実績":"#3b82f6",
    "現実・制約":"#94a3b8"
};

let nodes=[], connections=[], undoStack=[];
let selectedNode=null;

// ===== カテゴリ =====
function refreshCategory(){
    category.innerHTML="";
    Object.keys(categories).forEach(c=>{
        let o=document.createElement("option");
        o.value=c; o.innerText=c;
        category.appendChild(o);
    });
}
refreshCategory();

function addCategory(){
    categories[newCat.value]=catColor.value;
    localStorage.setItem("cats",JSON.stringify(categories));
    refreshCategory();
}

// ===== ノード =====
function createNode(data=null){
    const text=data?data.text:input.value;
    if(!text) return;

    pushUndo();

    const node=document.createElement("div");
    const id=data?data.id:"n_"+Date.now();

    node.className="node";
    node.id=id;
    node.style.left=data?.left||"100px";
    node.style.top=data?.top||"100px";

    const modeVal=data?data.mode:mode.value;

    if(modeVal==="box"){
        const cat=data?data.cat:category.value;
        node.classList.add("node-box");
        node.style.borderColor=categories[cat];
        node.innerHTML=`<div style="font-size:10px">${cat}</div><div>${text}</div>`;
        node.dataset.cat=cat;
    }else{
        node.classList.add("node-text");
        node.innerText=text;
    }

    node.dataset.mode=modeVal;

    const r=document.createElement("div");
    r.className="resizer";
    node.appendChild(r);

    initDrag(node);
    initResize(node,r);
    initLongPress(node);

    node.onclick=(e)=>{
        e.stopPropagation();
        if(!selectedNode){
            selectedNode=id;
            node.style.outline="3px solid red";
        }else{
            connect(selectedNode,id);
            document.getElementById(selectedNode).style.outline="none";
            selectedNode=null;
        }
    };

    canvas.appendChild(node);
    nodes.push({id,el:node});
    save();
}

// ===== ドラッグ =====
function initDrag(node){
    node.addEventListener("pointerdown",(e)=>{
        if(e.target.classList.contains("resizer")) return;
        const ox=e.offsetX, oy=e.offsetY;

        const move=(me)=>{
            node.style.left=(me.clientX-ox)+"px";
            node.style.top=(me.clientY-oy)+"px";
            updateLines(node.id);
        };

        const up=()=>{
            window.removeEventListener("pointermove",move);
            window.removeEventListener("pointerup",up);
            save();
        };

        window.addEventListener("pointermove",move);
        window.addEventListener("pointerup",up);
    });
}

// ===== リサイズ =====
function initResize(node,r){
    r.addEventListener("pointerdown",(e)=>{
        e.stopPropagation();
        let sx=e.clientX, sy=e.clientY;
        let sw=node.offsetWidth, sh=node.offsetHeight;

        const move=(me)=>{
            node.style.width=(sw+me.clientX-sx)+"px";
            node.style.height=(sh+me.clientY-sy)+"px";
            updateLines(node.id);
        };

        const up=()=>{
            window.removeEventListener("pointermove",move);
            window.removeEventListener("pointerup",up);
            save();
        };

        window.addEventListener("pointermove",move);
        window.addEventListener("pointerup",up);
    });
}

// ===== 長押し削除 =====
function initLongPress(node){
    let timer;
    node.addEventListener("pointerdown",()=>{
        timer=setTimeout(()=>deleteNode(node.id),700);
    });
    node.addEventListener("pointerup",()=>clearTimeout(timer));
    node.addEventListener("pointermove",()=>clearTimeout(timer));
}

// ===== 接続 =====
function connect(a,b){
    const line=new LeaderLine(
        document.getElementById(a),
        document.getElementById(b),
        {color:"#6366f1"}
    );

    line.path.onclick=()=>{
        line.remove();
        connections=connections.filter(c=>c.line!==line);
        save();
    };

    connections.push({a,b,line});
}

// ===== 更新 =====
function updateLines(id){
    connections.forEach(c=>{
        if(c.a===id||c.b===id) c.line.position();
    });
}

// ===== 削除 =====
function deleteNode(id){
    document.getElementById(id).remove();
    connections=connections.filter(c=>{
        if(c.a===id||c.b===id){c.line.remove();return false;}
        return true;
    });
    nodes=nodes.filter(n=>n.id!==id);
    save();
}

// ===== 保存 =====
function save(){
    const data={
        nodes:nodes.map(n=>({
            id:n.id,
            text:n.el.innerText,
            left:n.el.style.left,
            top:n.el.style.top,
            mode:n.el.dataset.mode,
            cat:n.el.dataset.cat
        })),
        connections:connections.map(c=>({a:c.a,b:c.b}))
    };
    localStorage.setItem("tf",JSON.stringify(data));
}

// ===== 読込 =====
function load(){
    const data=JSON.parse(localStorage.getItem("tf"));
    if(!data) return;
    data.nodes.forEach(n=>createNode(n));
    data.connections.forEach(c=>connect(c.a,c.b));
}
window.onload=load;

// ===== その他 =====
function downloadData(){
    const blob=new Blob([localStorage.getItem("tf")]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="data.json";
    a.click();
}

function importData(){
    const i=document.createElement("input");
    i.type="file";
    i.onchange=e=>{
        const r=new FileReader();
        r.onload=ev=>{
            localStorage.setItem("tf",ev.target.result);
            location.reload();
        };
        r.readAsText(e.target.files[0]);
    };
    i.click();
}

async function exportPDF(){
    const c=await html2canvas(canvas);
    const pdf=new jspdf.jsPDF("l","mm","a4");
    pdf.addImage(c.toDataURL(),"PNG",0,0,297,150);
    pdf.save("thinkflow.pdf");
}

function pushUndo(){ undoStack.push(localStorage.getItem("tf")); }
function undo(){
    if(!undoStack.length) return;
    localStorage.setItem("tf",undoStack.pop());
    location.reload();
}

function clearAll(){
    if(!confirm("全削除しますか？")) return;
    localStorage.clear();
    location.reload();
}
</script>

</body>
</html>
