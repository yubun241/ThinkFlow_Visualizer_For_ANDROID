<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ThinkFlow</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/leader-line-new@1.1.9/leader-line.min.js"></script>

<style>
body { touch-action: none; }
.canvas { position: relative; width: 100%; height: 85vh; background: #fff; overflow: hidden; }
.node { position: absolute; min-width: 80px; min-height: 40px; background: #fff; border: 2px solid #6366f1; border-radius: 10px; padding: 10px; touch-action: none; }
.resizer { width: 14px; height: 14px; background: #6366f1; position: absolute; right: 0; bottom: 0; }
.header { display:flex; justify-content:space-between; padding:10px; font-weight:bold; }
.line-selected { filter: drop-shadow(0 0 6px red); }
</style>
</head>

<body class="bg-gray-100">

<!-- ヘッダー -->
<div class="header">
    <div class="text-purple-600 text-lg">ThinkFlow</div>
    <div class="text-gray-700 text-sm">藤井工藝</div>
</div>

<!-- 操作 -->
<div class="p-2 flex gap-2">
    <textarea id="input" class="flex-1 p-2 border rounded" placeholder="入力"></textarea>
    <button onclick="createNode()" class="bg-black text-white px-3 py-2 rounded">追加</button>
    <button onclick="clearAll()" class="bg-red-500 text-white px-3 py-2 rounded">全消去</button>
</div>

<div id="canvas" class="canvas"></div>

<script>
let nodes = [];
let connections = [];
let selectedNode = null;
let selectedLine = null;

// ===== ノード作成 =====
function createNode(data=null){
    const text = data ? data.text : document.getElementById("input").value;
    if(!text) return;

    const node = document.createElement("div");
    const id = data ? data.id : "n_" + Date.now();

    node.className = "node";
    node.id = id;
    node.innerText = text;

    node.style.left = data ? data.left : "50px";
    node.style.top = data ? data.top : "50px";

    const resizer = document.createElement("div");
    resizer.className = "resizer";
    node.appendChild(resizer);

    initDrag(node);
    initResize(node, resizer);
    initLongPress(node);

    node.onclick = (e)=>{
        e.stopPropagation();

        if(!selectedNode){
            selectedNode = id;
            node.style.outline = "3px solid red";
        }else if(selectedNode === id){
            node.style.outline = "none";
            selectedNode = null;
        }else{
            connect(selectedNode, id);
            document.getElementById(selectedNode).style.outline="none";
            selectedNode=null;
        }
    };

    document.getElementById("canvas").appendChild(node);
    nodes.push({id, el:node});
    save();
}

// ===== ドラッグ =====
function initDrag(node){
    let offsetX, offsetY;

    node.addEventListener("pointerdown", (e)=>{
        if(e.target.classList.contains("resizer")) return;

        const rect = node.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;

        const move = (me)=>{
            node.style.left = (me.clientX - offsetX) + "px";
            node.style.top = (me.clientY - offsetY) + "px";
            updateLines(node.id);
        };

        const up = ()=>{
            window.removeEventListener("pointermove", move);
            window.removeEventListener("pointerup", up);
            save();
        };

        window.addEventListener("pointermove", move);
        window.addEventListener("pointerup", up);
    });
}

// ===== リサイズ =====
function initResize(node, handle){
    handle.addEventListener("pointerdown", (e)=>{
        e.stopPropagation();

        let startX = e.clientX;
        let startY = e.clientY;
        let startW = node.offsetWidth;
        let startH = node.offsetHeight;

        const move = (me)=>{
            node.style.width = (startW + me.clientX - startX) + "px";
            node.style.height = (startH + me.clientY - startY) + "px";
            updateLines(node.id);
        };

        const up = ()=>{
            window.removeEventListener("pointermove", move);
            window.removeEventListener("pointerup", up);
            save();
        };

        window.addEventListener("pointermove", move);
        window.addEventListener("pointerup", up);
    });
}

// ===== 長押し削除 =====
function initLongPress(node){
    let timer;

    node.addEventListener("pointerdown", ()=>{
        timer = setTimeout(()=>{
            deleteNode(node.id);
        }, 700);
    });

    node.addEventListener("pointerup", ()=>clearTimeout(timer));
    node.addEventListener("pointermove", ()=>clearTimeout(timer));
}

// ===== 接続（改善版） =====
function connect(a,b){
    const line = new LeaderLine(
        document.getElementById(a),
        document.getElementById(b),
        { color: "#6366f1", size:3 }
    );

    // タップで選択→再タップで削除
    line.path.addEventListener("click", ()=>{
        if(selectedLine === line){
            line.remove();
            connections = connections.filter(c=>c.line!==line);
            selectedLine = null;
            save();
        }else{
            if(selectedLine){
                selectedLine.path.classList.remove("line-selected");
            }
            selectedLine = line;
            line.path.classList.add("line-selected");
        }
    });

    connections.push({a,b,line});
}

// ===== 線更新 =====
function updateLines(id){
    connections.forEach(c=>{
        if(c.a===id || c.b===id){
            c.line.position();
        }
    });
}

// ===== 削除 =====
function deleteNode(id){
    const node = document.getElementById(id);
    node.remove();

    connections = connections.filter(c=>{
        if(c.a===id || c.b===id){
            c.line.remove();
            return false;
        }
        return true;
    });

    nodes = nodes.filter(n=>n.id!==id);
    save();
}

// ===== 全消去 =====
function clearAll(){
    if(!confirm("全て削除しますか？")) return;

    nodes.forEach(n=>n.el.remove());
    connections.forEach(c=>c.line.remove());

    nodes = [];
    connections = [];
    localStorage.clear();
}

// ===== 保存 =====
function save(){
    const data = {
        nodes: nodes.map(n=>({
            id:n.id,
            text:n.el.innerText,
            left:n.el.style.left,
            top:n.el.style.top
        })),
        connections: connections.map(c=>({a:c.a,b:c.b}))
    };
    localStorage.setItem("tf", JSON.stringify(data));
}

// ===== 読込 =====
function load(){
    const data = JSON.parse(localStorage.getItem("tf"));
    if(!data) return;

    data.nodes.forEach(n=>createNode(n));
    data.connections.forEach(c=>connect(c.a,c.b));
}
window.onload = load;

</script>
</body>
</html>
