<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ThinkFlow Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/leader-line-new@1.1.9/leader-line.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { margin:0; background:#f1f5f9; touch-action:none; }

.header {
    display:flex; justify-content:space-between;
    padding:10px 16px; background:white;
    border-bottom:1px solid #ddd;
}

.canvas {
    width:100%; height:75vh;
    position:relative;
    background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
    background-size: 20px 20px;
}

.node {
    position:absolute;
    padding:10px;
    border-radius:12px;
    min-width:80px;
    touch-action:none;
    background:white;
}

.node-box {
    border:2px solid;
}

.node-text {
    font-size:20px;
    font-weight:bold;
    background:transparent;
}

.resizer {
    width:12px;height:12px;
    position:absolute;
    right:0;bottom:0;
    background:#6366f1;
}
</style>
</head>

<body>

<div class="header">
    <div class="text-purple-600 font-bold">ThinkFlow</div>
    <div>藤井工藝</div>
</div>

<div class="p-2 space-y-2 bg-white">

<!-- 上段ボタン -->
<div class="flex gap-2 flex-wrap">
<button onclick="undo()" class="bg-gray-300 px-3 py-1 rounded">戻る</button>
<button onclick="exportPDF()" class="bg-indigo-500 text-white px-3 py-1 rounded">PDF</button>
<button onclick="downloadData()" class="bg-black text-white px-3 py-1 rounded">保存</button>
<button onclick="importData()" class="bg-gray-500 text-white px-3 py-1 rounded">読込</button>
<button onclick="clearAll()" class="bg-red-500 text-white px-3 py-1 rounded">全消去</button>
</div>

<!-- モード -->
<select id="mode" class="w-full p-2 border rounded">
<option value="box">枠あり</option>
<option value="text">枠なし（タイトル）</option>
</select>

<!-- カテゴリ -->
<select id="category" class="w-full p-2 border rounded"></select>

<div class="flex gap-2">
<input id="newCat" placeholder="カテゴリ追加" class="flex-1 p-2 border rounded">
<input type="color" id="catColor">
<button onclick="addCategory()" class="bg-blue-500 text-white px-3">追加</button>
</div>

<textarea id="input" class="w-full p-2 border rounded" placeholder="入力"></textarea>

<button onclick="createNode()" class="w-full bg-black text-white p-2 rounded">追加</button>

</div>

<div id="canvas" class="canvas"></div>

<script>
let categories = JSON.parse(localStorage.getItem("cats")) || {
    "資産・実績":"#3b82f6",
    "現実・制約":"#94a3b8",
    "感情・動機":"#ec4899",
    "想定推移":"#f59e0b",
    "仕組み・手段":"#6366f1",
    "理想・目的":"#10b981"
};

let nodes=[];
let connections=[];
let selectedNode=null;
let undoStack=[];

// ===== カテゴリ =====
function refreshCategory(){
    const sel=document.getElementById("category");
    sel.innerHTML="";
    Object.keys(categories).forEach(c=>{
        const opt=document.createElement("option");
        opt.value=c;
        opt.innerText=c;
        sel.appendChild(opt);
    });
}
refreshCategory();

function addCategory(){
    const name=newCat.value;
    const color=catColor.value;
    if(!name) return;
    categories[name]=color;
    localStorage.setItem("cats",JSON.stringify(categories));
    refreshCategory();
}

// ===== ノード =====
function createNode(data=null){
    const text=data?data.text:input.value;
    if(!text) return;

    pushUndo();

    const node=document.createElement("div");
    const id=data?data.id:"n_"+Date.now();

    node.className="node";
    node.id=id;
    node.style.left=data?.left||"100px";
    node.style.top=data?.top||"100px";

    const modeVal=data?data.mode:mode.value;

    if(modeVal==="box"){
        const cat=data?data.cat:category.value;
        const color=categories[cat];

        node.classList.add("node-box");
        node.style.borderColor=color;

        node.innerHTML=`<div style="font-size:10px">${cat}</div><div>${text}</div>`;
        node.dataset.cat=cat;
    }else{
        node.classList.add("node-text");
        node.innerText=text;
    }

    node.dataset.mode=modeVal;

    const r=document.createElement("div");
    r.className="resizer";
    node.appendChild(r);

    initDrag(node);
    initResize(node,r);

    node.onclick=(e)=>{
        e.stopPropagation();
        if(!selectedNode){
            selectedNode=id;
            node.style.outline="3px solid red";
        }else{
            connect(selectedNode,id);
            document.getElementById(selectedNode).style.outline="none";
            selectedNode=null;
        }
    };

    node.onpointerdown=(e)=>{
        let t=setTimeout(()=>deleteNode(id),700);
        node.onpointerup=()=>clearTimeout(t);
        node.onpointermove=()=>clearTimeout(t);
    };

    canvas.appendChild(node);
    nodes.push({id,el:node});
    save();
}

// ===== ドラッグ =====
function initDrag(node){
    node.onpointerdown=(e)=>{
        if(e.target.classList.contains("resizer")) return;
        const ox=e.offsetX, oy=e.offsetY;

        const move=(me)=>{
            node.style.left=(me.clientX-ox)+"px";
            node.style.top=(me.clientY-oy)+"px";
            updateLines(node.id);
        };

        const up=()=>{
            window.removeEventListener("pointermove",move);
            window.removeEventListener("pointerup",up);
            save();
        };

        window.addEventListener("pointermove",move);
        window.addEventListener("pointerup",up);
    };
}

// ===== リサイズ =====
function initResize(node,r){
    r.onpointerdown=(e)=>{
        e.stopPropagation();
        let sx=e.clientX, sy=e.clientY;
        let sw=node.offsetWidth, sh=node.offsetHeight;

        const move=(me)=>{
            node.style.width=(sw+me.clientX-sx)+"px";
            node.style.height=(sh+me.clientY-sy)+"px";
            updateLines(node.id);
        };

        const up=()=>{
            window.removeEventListener("pointermove",move);
            window.removeEventListener("pointerup",up);
            save();
        };

        window.addEventListener("pointermove",move);
        window.addEventListener("pointerup",up);
    };
}

// ===== 接続 =====
function connect(a,b){
    const line=new LeaderLine(
        document.getElementById(a),
        document.getElementById(b),
        {color:"#6366f1"}
    );

    line.path.onclick=()=>{
        line.remove();
        connections=connections.filter(c=>c.line!==line);
        save();
    };

    connections.push({a,b,line});
}

// ===== 更新 =====
function updateLines(id){
    connections.forEach(c=>{
        if(c.a===id||c.b===id) c.line.position();
    });
}

// ===== 削除 =====
function deleteNode(id){
    document.getElementById(id).remove();
    connections=connections.filter(c=>{
        if(c.a===id||c.b===id){c.line.remove();return false;}
        return true;
    });
    nodes=nodes.filter(n=>n.id!==id);
    save();
}

// ===== 保存 =====
function save(){
    const data={
        nodes:nodes.map(n=>({
            id:n.id,
            text:n.el.innerText,
            left:n.el.style.left,
            top:n.el.style.top,
            mode:n.el.dataset.mode,
            cat:n.el.dataset.cat
        })),
        connections:connections.map(c=>({a:c.a,b:c.b}))
    };
    localStorage.setItem("tf",JSON.stringify(data));
}

// ===== 読込 =====
function load(){
    const data=JSON.parse(localStorage.getItem("tf"));
    if(!data) return;
    data.nodes.forEach(n=>createNode(n));
    data.connections.forEach(c=>connect(c.a,c.b));
}
window.onload=load;

// ===== ファイル =====
function downloadData(){
    const blob=new Blob([localStorage.getItem("tf")]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="data.json";
    a.click();
}

function importData(){
    const input=document.createElement("input");
    input.type="file";
    input.onchange=e=>{
        const r=new FileReader();
        r.onload=ev=>{
            localStorage.setItem("tf",ev.target.result);
            location.reload();
        };
        r.readAsText(e.target.files[0]);
    };
    input.click();
}

// ===== PDF =====
async function exportPDF(){
    const canvasEl=await html2canvas(canvas);
    const pdf=new jspdf.jsPDF("l","mm","a4");
    pdf.addImage(canvasEl.toDataURL(),"PNG",0,0,297,150);
    pdf.save("thinkflow.pdf");
}

// ===== Undo =====
function pushUndo(){
    undoStack.push(localStorage.getItem("tf"));
}
function undo(){
    if(!undoStack.length) return;
    localStorage.setItem("tf",undoStack.pop());
    location.reload();
}

// ===== 全消去 =====
function clearAll(){
    if(!confirm("全削除しますか？")) return;
    localStorage.clear();
    location.reload();
}
</script>

</body>
</html>
