<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ThinkFlow Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/leader-line-new@1.1.9/leader-line.min.js"></script>

<style>
body { margin:0; background:#f1f5f9; touch-action:none; }

.header {
    display:flex; justify-content:space-between;
    padding:10px 16px; background:white;
}

.canvas {
    width:100%; height:70vh;
    position:relative;
    background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
    background-size: 20px 20px;
}

.node {
    position:absolute;
    padding:10px;
    border-radius:12px;
    min-width:80px;
    touch-action:none;
}

.node-box {
    border:2px solid;
    background:white;
}

.node-text {
    font-size:20px;
    font-weight:bold;
    background:transparent;
}

.resizer {
    width:12px;height:12px;
    position:absolute;
    right:0;bottom:0;
    background:#6366f1;
}
</style>
</head>

<body>

<div class="header">
    <div class="text-purple-600 font-bold">ThinkFlow</div>
    <div>藤井工藝</div>
</div>

<div class="p-2 space-y-2">

<!-- モード -->
<select id="mode" class="w-full p-2 border rounded">
<option value="box">枠あり</option>
<option value="text">枠なし（タイトル）</option>
</select>

<!-- カテゴリ -->
<select id="category" class="w-full p-2 border rounded"></select>

<div class="flex gap-2">
<input id="newCat" placeholder="カテゴリ追加" class="flex-1 p-2 border rounded">
<input type="color" id="catColor">
<button onclick="addCategory()" class="bg-blue-500 text-white px-3">追加</button>
</div>

<textarea id="input" class="w-full p-2 border rounded" placeholder="入力"></textarea>

<button onclick="createNode()" class="w-full bg-black text-white p-2 rounded">追加</button>

</div>

<div id="canvas" class="canvas"></div>

<script>
let categories = JSON.parse(localStorage.getItem("cats")) || {
    "資産・実績":"#3b82f6",
    "現実・制約":"#94a3b8",
    "感情・動機":"#ec4899",
    "想定推移":"#f59e0b",
    "仕組み・手段":"#6366f1",
    "理想・目的":"#10b981"
};

let nodes=[];

// ===== カテゴリUI更新 =====
function refreshCategory(){
    const sel=document.getElementById("category");
    sel.innerHTML="";
    Object.keys(categories).forEach(c=>{
        const opt=document.createElement("option");
        opt.value=c;
        opt.innerText=c;
        sel.appendChild(opt);
    });
}
refreshCategory();

// ===== カテゴリ追加 =====
function addCategory(){
    const name=newCat.value;
    const color=catColor.value;
    if(!name) return;

    categories[name]=color;
    localStorage.setItem("cats",JSON.stringify(categories));
    refreshCategory();
}

// ===== ノード作成 =====
function createNode(){
    const text=input.value;
    if(!text) return;

    const mode=mode.value;
    const node=document.createElement("div");
    const id="n_"+Date.now();

    node.className="node";
    node.id=id;
    node.style.left="100px";
    node.style.top="100px";

    if(mode==="box"){
        const cat=category.value;
        const color=categories[cat];

        node.classList.add("node-box");
        node.style.borderColor=color;

        node.innerHTML=`
        <div style="font-size:10px;opacity:0.6">${cat}</div>
        <div>${text}</div>
        `;
    }else{
        node.classList.add("node-text");
        node.innerText=text;
    }

    // リサイズ
    const r=document.createElement("div");
    r.className="resizer";
    node.appendChild(r);

    initDrag(node);
    initResize(node,r);

    canvas.appendChild(node);
    nodes.push({id,el:node});
}

// ===== ドラッグ =====
function initDrag(node){
    node.onpointerdown=(e)=>{
        if(e.target.classList.contains("resizer")) return;

        const ox=e.offsetX;
        const oy=e.offsetY;

        const move=(me)=>{
            node.style.left=(me.clientX-ox)+"px";
            node.style.top=(me.clientY-oy)+"px";
        };

        const up=()=>{
            window.removeEventListener("pointermove",move);
            window.removeEventListener("pointerup",up);
        };

        window.addEventListener("pointermove",move);
        window.addEventListener("pointerup",up);
    };
}

// ===== リサイズ =====
function initResize(node,r){
    r.onpointerdown=(e)=>{
        e.stopPropagation();

        let sx=e.clientX;
        let sy=e.clientY;
        let sw=node.offsetWidth;
        let sh=node.offsetHeight;

        const move=(me)=>{
            node.style.width=(sw+me.clientX-sx)+"px";
            node.style.height=(sh+me.clientY-sy)+"px";
        };

        const up=()=>{
            window.removeEventListener("pointermove",move);
            window.removeEventListener("pointerup",up);
        };

        window.addEventListener("pointermove",move);
        window.addEventListener("pointerup",up);
    };
}

</script>

</body>
</html>
